<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gol de Letras">
    <meta name="theme-color" content="#667eea">
    <title>Misión Gol de Letras</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- PANTALLA DE INICIO -->
    <div id="pantallaInicio" class="pantalla activa">
        <div class="contenedor-inicio">
            <!-- Cancha de fútbol decorativa -->
            <div class="cancha-decorativa">
                <div class="circulo-central"></div>
                <div class="porteria-superior"></div>
                <div class="porteria-inferior"></div>
            </div>
            
            <h1 class="titulo">⚽ Misión Gol de Letras ⚽</h1>
            <p class="subtitulo">¡Escucha y marca gol!</p>
            
            <!-- Mostrar progreso guardado -->
            <div class="progreso-inicio">
                <p>Estrellas ganadas: <span id="estrellasGuardadas">0</span> ⭐</p>
            </div>
            
            <button id="btnJugar" class="boton-grande" aria-label="Botón para iniciar el juego">JUGAR</button>
        </div>
    </div>

    <!-- PANTALLA DE JUEGO -->
    <div id="pantallaJuego" class="pantalla">
        <div class="contenedor-juego">
            <!-- Encabezado del juego -->
            <div class="encabezado-juego">
                <button id="btnVolver" class="boton-volver" aria-label="Volver a la pantalla principal">← Volver</button>
                <div class="estrellas-actuales" aria-label="Estrellas ganadas">
                    <span id="contadorEstrellas">0</span> ⭐
                </div>
            </div>

            <!-- Área de escucha -->
            <div class="area-escucha">
                <h2 id="instrucciones" class="instrucciones" aria-live="polite">Escucha la sílaba</h2>
                <button id="btnRepetir" class="boton-repetir" aria-label="Botón para repetir el sonido de la sílaba">🔊 Repetir</button>
            </div>

            <!-- Área de selección con tarjetas -->
            <div class="area-opciones" role="radiogroup" aria-label="Opciones de sílabas para elegir">
                <div id="opcion1" class="tarjeta-opcion" data-opcion="0" role="radio" tabindex="0" aria-label="Opción 1">
                    <span class="texto-tarjeta" id="texto1"></span>
                </div>
                <div id="opcion2" class="tarjeta-opcion" data-opcion="1" role="radio" tabindex="0" aria-label="Opción 2">
                    <span class="texto-tarjeta" id="texto2"></span>
                </div>
                <div id="opcion3" class="tarjeta-opcion" data-opcion="2" role="radio" tabindex="0" aria-label="Opción 3">
                    <span class="texto-tarjeta" id="texto3"></span>
                </div>
            </div>

            <!-- Feedback visual (sin mensajes negativos) -->
            <div id="feedback" class="feedback" aria-live="assertive" aria-atomic="true"></div>
        </div>
    </div>

    <!-- Script del juego -->
    <script src="game.js"></script>
</body>
</html>
